version: '3.8'

# ================================================================
# CÁCH DÙNG:
#   Chạy thường:   docker compose up --build
#   Chạy nền:      docker compose up --build -d
#   Dừng:          docker compose down
#   Xem log:       docker compose logs -f
#   Kèm admin UI:  docker compose --profile dev up --build
# ================================================================

services:

  # ============================================
  # MongoDB Database
  # ============================================
  mongodb:
    image: mongo:6.0
    container_name: taskmanager-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-adminpassword}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-taskmanager}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      # Script khởi tạo collections & indexes (chỉ chạy lần đầu)
      - ../server/DB/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - taskmanager-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ============================================
  # Backend API (Node.js + Express)
  # ============================================
  backend:
    build:
      context: ../backend        # Dockerfile nằm trong backend/
      dockerfile: Dockerfile
    container_name: taskmanager-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      # Kết nối đến container mongodb (không dùng Atlas khi chạy Docker)
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-adminpassword}@mongodb:27017/${MONGO_DATABASE:-taskmanager}?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-do_an_cuoi_ki_web_nang_cao_secret_key_2026}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - taskmanager-network
    healthcheck:
      # Gọi route GET / của Express để kiểm tra backend sống
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # Frontend (React → build → Nginx)
  # ============================================
  frontend:
    build:
      context: ../frontend       # Dockerfile nằm trong frontend/
      dockerfile: Dockerfile
      args:
        # /api → nginx proxy → backend container (không cần biết port backend)
        REACT_APP_API_URL: /api
    container_name: taskmanager-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"   # Truy cập tại http://localhost:3000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - taskmanager-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 20s
      timeout: 10s
      retries: 3

  # ============================================
  # Mongo Express — Admin UI cho MongoDB
  # Chạy bằng: docker compose --profile dev up
  # Truy cập:  http://localhost:8081
  # ============================================
  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: taskmanager-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-adminpassword}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-adminpassword}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - taskmanager-network
    profiles:
      - dev   # Chỉ chạy khi thêm --profile dev

# ============================================
# Networks
# ============================================
networks:
  taskmanager-network:
    driver: bridge

# ============================================
# Volumes (dữ liệu MongoDB được giữ lại khi restart)
# ============================================
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
