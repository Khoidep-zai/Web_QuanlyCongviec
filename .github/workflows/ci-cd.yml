name: CI/CD Pipeline

on:
  push:
    branches: [dev, staging, main]
  pull_request:
    branches: [main, staging]

env:
  NODE_VERSION: '18'
  MONGODB_VERSION: '6.0'

jobs:
  # ============================================
  # TEST JOB
  # ============================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    strategy:
      matrix:
        test-type: [backend, frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/${{ matrix.test-type }}/package-lock.json
      
      - name: Install Backend Dependencies
        if: matrix.test-type == 'backend'
        working-directory: ./src/backend
        run: npm ci
      
      - name: Install Frontend Dependencies
        if: matrix.test-type == 'frontend'
        working-directory: ./src/frontend
        run: npm ci
      
      - name: Run Backend Linting
        if: matrix.test-type == 'backend'
        working-directory: ./src/backend
        run: npm run lint
      
      - name: Run Frontend Linting
        if: matrix.test-type == 'frontend'
        working-directory: ./src/frontend
        run: npm run lint
      
      - name: Run Backend Tests
        if: matrix.test-type == 'backend'
        working-directory: ./src/backend
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://admin:password@localhost:27017/taskmanager_test?authSource=admin
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test_jwt_secret
          JWT_REFRESH_SECRET: test_refresh_secret
        run: npm run test:coverage
      
      - name: Run Frontend Tests
        if: matrix.test-type == 'frontend'
        working-directory: ./src/frontend
        run: npm run test:coverage
      
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./src/${{ matrix.test-type }}/coverage/lcov.info
          flags: ${{ matrix.test-type }}
          name: ${{ matrix.test-type }}-coverage
      
      - name: Build Backend
        if: matrix.test-type == 'backend'
        working-directory: ./src/backend
        run: npm run build
      
      - name: Build Frontend
        if: matrix.test-type == 'frontend'
        working-directory: ./src/frontend
        env:
          REACT_APP_API_URL: http://localhost:5000/api
          REACT_APP_SOCKET_URL: http://localhost:5000
        run: npm run build

  # ============================================
  # SECURITY SCAN JOB
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run npm audit (Backend)
        working-directory: ./src/backend
        run: npm audit --production
        continue-on-error: true
      
      - name: Run npm audit (Frontend)
        working-directory: ./src/frontend
        run: npm audit --production
        continue-on-error: true
      
      - name: Run Snyk Security Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --severity-threshold=high

  # ============================================
  # BUILD DOCKER IMAGES
  # ============================================
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME }}/taskmanager-backend
            ${{ secrets.DOCKER_USERNAME }}/taskmanager-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
      
      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/taskmanager-backend:${{ github.ref_name }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/taskmanager-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/taskmanager-backend:buildcache,mode=max
      
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/taskmanager-frontend:${{ github.ref_name }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/taskmanager-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/taskmanager-frontend:buildcache,mode=max

  # ============================================
  # DEPLOY TO DEVELOPMENT
  # ============================================
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/dev'
    environment:
      name: development
      url: https://dev.taskmanager.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Development Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          script: |
            cd /opt/taskmanager
            docker-compose pull
            docker-compose up -d
            docker-compose exec -T backend npm run migrate
      
      - name: Run Smoke Tests
        run: |
          sleep 30
          curl -f https://dev.taskmanager.example.com/health || exit 1

  # ============================================
  # DEPLOY TO STAGING
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: https://staging.taskmanager.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Staging Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_SERVER_HOST }}
          username: ${{ secrets.STAGING_SERVER_USER }}
          key: ${{ secrets.STAGING_SERVER_SSH_KEY }}
          script: |
            cd /opt/taskmanager
            docker-compose pull
            docker-compose up -d
            docker-compose exec -T backend npm run migrate
      
      - name: Run E2E Tests
        working-directory: ./src/frontend
        env:
          CYPRESS_BASE_URL: https://staging.taskmanager.example.com
        run: |
          npm ci
          npm run test:e2e:ci
      
      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Staging deployment completed'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # ============================================
  # DEPLOY TO PRODUCTION
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-docker, security]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://taskmanager.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create Database Backup
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: |
            cd /opt/taskmanager
            ./ops/scripts/backup-database.sh
      
      - name: Deploy to Production (Blue-Green)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: |
            cd /opt/taskmanager
            ./ops/scripts/blue-green-deploy.sh
      
      - name: Run Health Checks
        run: |
          sleep 60
          for i in {1..5}; do
            if curl -f https://taskmanager.example.com/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
      
      - name: Rollback on Failure
        if: failure()
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: |
            cd /opt/taskmanager
            ./ops/scripts/rollback.sh
      
      - name: Create GitHub Release
        if: success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Production deployment successful
            Commit: ${{ github.sha }}
      
      - name: Notify Team
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Production deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
